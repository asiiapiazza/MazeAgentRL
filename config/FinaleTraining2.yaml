behaviors: 
  CubeAgent: 
    trainer_type: ppo
    hyperparameters:
      batch_size: 128 
      buffer_size: 2048
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
      use_recurrent: true
      memory_size: 256
      sequence_length: 64
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.02
        learning_rate: 0.0003
        encoding_size: 128
    max_steps: 1000000
    time_horizon: 1024
    summary_freq: 10000
    checkpoint_interval: 20000
